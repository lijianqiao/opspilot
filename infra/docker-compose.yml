services:
  postgres:
    image: postgres:17-alpine
    container_name: opspilot-postgres
    environment:
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
      POSTGRES_DB: opspilot
    ports:
      - "5432:5432"
    volumes:
      - opspilot_pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: opspilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - opspilot_qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    ports:
      - "6379:6379"

  agent-core:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: opspilot-agent-core
    environment:
      OPSPILOT_LLM_BASE_URL: ${OPSPILOT_LLM_BASE_URL:-http://host.docker.internal:8080/v1}
      OPSPILOT_LLM_MODEL: ${OPSPILOT_LLM_MODEL:-qwen3.5-9b}
      OPSPILOT_LLM_API_KEY: ${OPSPILOT_LLM_API_KEY:-sk-local}
      OPSPILOT_PG_DSN: postgresql://opspilot:opspilot@postgres:5432/opspilot
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - redis

volumes:
  opspilot_pgdata:
  opspilot_qdrant_data:
